<body>
    <nav class="navbar">
    <div class="navbar-left">
        <img src="../images/knight.png" alt="knight logo" class="navbar-logo">
        <ul class="navbar-menu">
            <li><a href="../Home/home.html">Home</a></li>

  <div class="card">
    <h1>Ritterspiele</h1>
    <p class="subtitle">Erstelle dein Konto</p>
 
    <div class="form-group">
        <label>Benutzername</label>
        <input type="text" id="username" placeholder="z.B. Ritter123" />
    </div>
 
    <div class="form-group">
        <label>E-Mail</label>
        <input type="email" id="email" placeholder="deine@email.com" />
    </div>
 
    <div class="form-group">
        <label>Passwort</label>
        <input type="password" id="password" placeholder="Mindestens 3 Zeichen" />
    </div>
 
    <button class="btn-register" id="registerBtn" onclick="register()">Registrieren</button>
 
    <div class="message" id="message"></div>
 
    <p class="login-link">Schon ein Konto? <a href="#">Einloggen</a></p>
</div>

</body>
