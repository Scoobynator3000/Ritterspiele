<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <title>Unity Web Player | Ritterspiele-Dress Up</title>
  <link rel="stylesheet" href="TemplateData/style.css">

  <style>
    body {
      margin: 0;
      background: #d9d9d9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* 🔥 Container kleiner, aber korrektes Seitenverhältnis */
    #unity-container {
      width: min(90vw, 960px);
      aspect-ratio: 16 / 9;
      background: black;
      position: relative;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #unity-loading-bar {
      position: absolute;
      width: 100%;
      top: 50%;
      transform: translateY(-50%);
    }
  </style>
</head>

<body>

  <div id="unity-container">
    <canvas id="unity-canvas"></canvas>

    <div id="unity-loading-bar">
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
  </div>

  <script>
    var canvas = document.querySelector("#unity-canvas");

    function unityShowBanner(msg, type) {
      console.log(msg);
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/Pagen-Simulator.loader.js";

    var config = {
      dataUrl: buildUrl + "/Pagen-Simulator.data",
      frameworkUrl: buildUrl + "/Pagen-Simulator.framework.js",
      codeUrl: buildUrl + "/Pagen-Simulator.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "Ritterspiele-Dress Up",
      productVersion: "1.0",
      showBanner: unityShowBanner,

      matchWebGLToCanvasSize: true,
      devicePixelRatio: 1
    };

    // 🔥 DAS ist der wichtige Part
    function resizeCanvas() {
      const container = document.getElementById("unity-container");

      const width = container.clientWidth;
      const height = container.clientHeight;

      // visuelle Größe
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";

      // interne Unity-Auflösung bleibt Full HD
      canvas.width = 1920;
      canvas.height = 1080;
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    document.querySelector("#unity-loading-bar").style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;

    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        document.querySelector("#unity-progress-bar-full").style.width =
          100 * progress + "%";
      })
      .then((unityInstance) => {
        document.querySelector("#unity-loading-bar").style.display = "none";
      })
      .catch((message) => {
        alert(message);
      });
    };

    document.body.appendChild(script);
  </script>

</body>
</html>
